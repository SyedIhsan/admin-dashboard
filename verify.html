<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEMO Admin - Verify Code</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Inter Font (Google Fonts) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Global Typography -->
  <link rel="stylesheet" href="styles/typography.css">
  
  <!-- OTP/Verify Page Styles -->
  <link rel="stylesheet" href="styles/verify.css">
</head>
<body class="bg-slate-50">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl shadow-slate-200 border border-slate-100 p-8 md:p-12">
      <div class="text-center mb-10">
        <div class="w-16 h-16 flex items-center justify-center mx-auto mb-6">
          <div class="text-3xl font-extrabold text-yellow-500">DEMO</div>
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Verify Code</h2>
        <p class="text-slate-500">Enter the 6-digit code sent to your email.</p>
      </div>

      <form id="verifyForm" class="space-y-6">
        <div id="errorMessage" class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl text-sm font-medium hidden"></div>

        <div id="successMessage" class="bg-green-50 border border-green-100 text-green-600 px-4 py-3 rounded-xl text-sm font-medium hidden"></div>

        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Verification Code</label>
          <input
            id="codeInput"
            name="code"
            type="text"
            inputmode="numeric"
            placeholder="000000"
            maxlength="6"
            class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition-all text-center text-xl tracking-widest"
          />
        </div>

        <button
          type="submit"
          class="w-full py-4 bg-yellow-500 text-white font-bold rounded-2xl hover:bg-yellow-600 shadow-xl shadow-yellow-100 transition-all active:scale-95"
        >
          Verify
        </button>

        <button
          id="resendBtn"
          type="button"
          class="w-full py-4 bg-slate-100 text-slate-700 font-bold rounded-2xl hover:bg-slate-200 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span id="resendText">Resend Code</span>
          <span id="cooldownText" class="hidden">Resend available in <span id="cooldownTimer">60</span>s</span>
        </button>
      </form>

      <div class="mt-8 text-center">
        <a href="index.html" class="text-yellow-500 hover:underline font-bold">
          Back to Sign In
        </a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="scripts/main.js"></script>
  <script src="scripts/verify.js"></script>
</body>
</html>
